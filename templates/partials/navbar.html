{% load static %}
<nav class="bg-brand-navy sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center gap-3 flex-shrink-0">
        {% if site_settings.logo %}
          <img src="{{ site_settings.logo.url }}" alt="GrowthMaster Logo" class="h-10 w-auto" />
        {% else %}
          <span class="text-white font-bold text-lg leading-tight">
            Growth<span class="text-brand-red">Master</span>
          </span>
        {% endif %}
      </a>

      <!-- Desktop nav links -->
      <div class="hidden md:flex items-center gap-8">
        <a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}nav-link-active{% endif %}">Home</a>
        <a href="{% url 'about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}nav-link-active{% endif %}">About</a>
        <a href="{% url 'services_list' %}" class="nav-link {% if 'service' in request.resolver_match.url_name %}nav-link-active{% endif %}">Services</a>
        <a href="{% url 'portfolio' %}" class="nav-link {% if request.resolver_match.url_name == 'portfolio' %}nav-link-active{% endif %}">Portfolio</a>
        <a href="{% url 'contact' %}" class="btn-primary text-sm">Contact Us</a>
      </div>

      <!-- Mobile hamburger -->
      <button id="nav-toggle" class="md:hidden text-white focus:outline-none" aria-label="Toggle menu">
        <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden pb-4">
      <div class="flex flex-col gap-3 pt-2">
        <a href="{% url 'home' %}" class="nav-link py-2 border-b border-white/10">Home</a>
        <a href="{% url 'about' %}" class="nav-link py-2 border-b border-white/10">About</a>
        <a href="{% url 'services_list' %}" class="nav-link py-2 border-b border-white/10">Services</a>
        <a href="{% url 'portfolio' %}" class="nav-link py-2 border-b border-white/10">Portfolio</a>
        <a href="{% url 'contact' %}" class="btn-primary mt-2 text-center">Contact Us</a>
      </div>
    </div>
  </div>
</nav>

<script>
  const toggle = document.getElementById('nav-toggle');
  const menu   = document.getElementById('mobile-menu');
  const open   = document.getElementById('icon-open');
  const close  = document.getElementById('icon-close');
  toggle.addEventListener('click', () => {
    menu.classList.toggle('hidden');
    open.classList.toggle('hidden');
    close.classList.toggle('hidden');
  });
</script>
